<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>TianTian Markt – Coming Soon</title>
  <meta name="description" content="TianTian Markt – Asian Supermarket Düsseldorf. Coming soon." />

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: #183233;
      background:
        radial-gradient(circle at center, rgba(255,255,255,0.96) 0%, rgba(255,255,255,0.9) 45%, rgba(222,244,241,0.75) 100%),
        linear-gradient(135deg, #f8fbfa 0%, #e8f6f3 100%);
      overflow: hidden;
    }

    .page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
      position: relative;
      text-align: center;
    }

    .bg-texture {
      position: absolute;
      inset: 0;
      pointer-events: none;
      opacity: 0.22;
      background:
        radial-gradient(circle at 15% 75%, #3d8d8a 0 2px, transparent 3px),
        radial-gradient(circle at 85% 25%, #3d8d8a 0 2px, transparent 3px);
      background-size: 90px 90px;
    }

    .card {
      position: relative;
      z-index: 1;
      max-width: 760px;
      width: 100%;
      padding: 48px 28px;
    }

    .logo {
      width: min(420px, 82vw);
      height: auto;
      display: block;
      margin: 0 auto 42px;
      filter: drop-shadow(0 18px 30px rgba(0,0,0,0.12));
    }

    h1 {
      margin: 0;
      font-size: clamp(42px, 7vw, 76px);
      letter-spacing: 0.12em;
      font-weight: 800;
      color: #075f61;
      text-transform: uppercase;
    }

    .divider {
      width: 280px;
      max-width: 70%;
      height: 2px;
      margin: 26px auto 28px;
      background: linear-gradient(90deg, transparent, #2caaa4, transparent);
    }

    p {
      margin: 0 auto;
      max-width: 560px;
      font-size: clamp(18px, 2.2vw, 26px);
      line-height: 1.55;
      color: #243b3c;
    }

    .thanks {
      margin-top: 18px;
      color: #07817d;
      font-weight: 700;
    }

    .contact {
      margin-top: 36px;
      font-size: 18px;
      color: #1f3435;
    }

    .contact a {
      color: inherit;
      text-decoration: none;
    }

    .contact a:hover {
      text-decoration: underline;
    }

    .bamboo {
      position: absolute;
      width: 240px;
      height: 420px;
      opacity: 0.18;
      border-left: 10px solid #087b76;
      transform: rotate(18deg);
    }

    .bamboo::before,
    .bamboo::after {
      content: "";
      position: absolute;
      width: 120px;
      height: 38px;
      border-radius: 100% 0 100% 0;
      background: #087b76;
      left: 20px;
    }

    .bamboo::before {
      top: 80px;
      transform: rotate(-30deg);
    }

    .bamboo::after {
      top: 180px;
      transform: rotate(25deg);
    }

    .bamboo.left {
      left: -60px;
      top: 30px;
    }

    .bamboo.right {
      right: -80px;
      bottom: 20px;
      transform: rotate(-160deg);
    }

    @media (max-width: 600px) {
      .card {
        padding: 24px 12px;
      }

      .logo {
        margin-bottom: 32px;
      }

      .contact {
        font-size: 16px;
      }
    }
  </style>
</head>

<body>
  <main class="page">
    <div class="bg-texture"></div>
    <div class="bamboo left"></div>
    <div class="bamboo right"></div>

    <section class="card">
      <img class="logo" src="assets/logo.png" alt="TianTian Markt Logo" />

      <h1>Coming Soon</h1>

      <div class="divider"></div>

      <p>Wir arbeiten daran, Ihnen bald ein neues Einkaufserlebnis zu bieten.</p>
      <p class="thanks">Vielen Dank für Ihre Geduld!</p>

      <div class="contact">
        <a href="mailto:info@tiantianmarkt.de">info@tiantianmarkt.de</a>
      </div>
    </section>
  </main>
</body>
</html>
